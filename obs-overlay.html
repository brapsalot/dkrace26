<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DK Rap Chaos — OBS Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* ── Audio unlock button (top-left, small) ── */
    #enableBtn {
      position: absolute;
      top: 8px; left: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      background: #e53;
      color: #fff;
      border: 2px solid #f64;
      border-radius: 6px;
      cursor: pointer;
      z-index: 100;
    }
    #enableBtn:hover { background: #f64; }
    #enableBtn.enabled {
      background: #2a2;
      border-color: #3b3;
      cursor: default;
      opacity: 0.6;
    }
    #enableBtn.hidden { display: none; }

    /* ── Chaos Log (top-right corner) ── */
    #chaosLog {
      position: absolute;
      top: 12px; right: 12px;
      width: 380px;
      max-height: 320px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      padding: 8px 10px;
      overflow: hidden;
      z-index: 10;
      display: none;
    }
    #chaosLog {
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }
    #chaosLog.visible {
      display: block;
      opacity: 1;
      transition: opacity 0.3s ease-in;
    }
    #chaosLog.fading {
      opacity: 0;
    }
    .log-entries {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-entry {
      font-size: 12px;
      color: #ccc;
      padding: 3px 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.05);
      animation: logFadeIn 0.3s ease-out;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-entry strong { color: #fff; }
    .log-entry.type-rap { border-left: 3px solid #ffd700; }
    .log-entry.type-control { border-left: 3px solid #4caf50; }
    .log-entry.type-piano { border-left: 3px solid #ce93d8; }
    .log-entry.type-cc { border-left: 3px solid #42a5f5; }
    .log-time { color: #888; font-size: 11px; }

    @keyframes logFadeIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Gamepad popup (bottom-left) ── */
    #gamepadPopup {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 20;
      transform: translateY(200%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #gamepadPopup.visible {
      transform: translateY(0);
    }
    .gamepad-header {
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(76, 175, 80, 0.5);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 6px 12px;
      text-align: center;
    }
    .gamepad-header .ctrl-label {
      color: #4caf50;
      font-size: 12px;
      font-weight: bold;
    }
    .gamepad-header .ctrl-name {
      color: #fff;
      font-weight: bold;
    }
    .gamepad-timer-bar {
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 0;
    }
    .gamepad-timer-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 0;
      transition: width 0.1s linear;
    }
    .gamepad-body {
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(76, 175, 80, 0.5);
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 10px 14px 14px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* SNES Gamepad layout */
    .gp-shoulders {
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
      gap: 120px;
    }
    .gp-main {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .gp-dpad {
      display: grid;
      grid-template-columns: 28px 28px 28px;
      grid-template-rows: 28px 28px 28px;
      gap: 2px;
    }
    .gp-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding-top: 20px;
    }
    .gp-face {
      display: grid;
      grid-template-columns: 28px 28px 28px;
      grid-template-rows: 28px 28px 28px;
      gap: 2px;
    }
    .gp-btn {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: rgba(80, 80, 80, 0.6);
      border: 1px solid rgba(120, 120, 120, 0.5);
      color: #aaa;
      font-size: 10px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      transition: background 0.05s, color 0.05s;
    }
    .gp-btn.pressed {
      background: rgba(255, 215, 0, 0.7);
      border-color: rgba(255, 215, 0, 0.9);
      color: #000;
    }
    .gp-btn.blank {
      background: transparent;
      border: none;
    }
    .gp-shoulder {
      width: 40px;
      height: 22px;
      border-radius: 4px;
      font-size: 10px;
    }
    .gp-center-btn {
      width: 32px;
      height: 16px;
      border-radius: 8px;
      font-size: 8px;
    }

    /* ── Piano popup (bottom-center) ── */
    #pianoPopup {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(200%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
    }
    #pianoPopup.visible {
      transform: translateX(-50%) translateY(0);
    }
    .piano-header {
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(206, 147, 216, 0.5);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 6px 12px;
      text-align: center;
    }
    .piano-header .piano-label {
      color: #ce93d8;
      font-size: 12px;
      font-weight: bold;
    }
    .piano-timer-bar {
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
    }
    .piano-timer-fill {
      height: 100%;
      background: #ce93d8;
      transition: width 0.1s linear;
    }
    .piano-body {
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(206, 147, 216, 0.5);
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 8px 10px 10px;
    }
    .piano-keys {
      display: flex;
      position: relative;
      height: 90px;
    }
    .p-key {
      position: relative;
      border-radius: 0 0 4px 4px;
      transition: background 0.05s;
    }
    .p-key.white {
      width: 28px;
      height: 90px;
      background: linear-gradient(180deg, #f8f8f8, #e8e8e8);
      border: 1px solid #999;
      z-index: 1;
    }
    .p-key.black {
      width: 18px;
      height: 58px;
      background: linear-gradient(180deg, #444, #1a1a1a);
      border: 1px solid #000;
      margin-left: -9px;
      margin-right: -9px;
      z-index: 2;
    }
    .p-key.white.pressed {
      background: linear-gradient(180deg, #ffd700, #e6c200) !important;
    }
    .p-key.black.pressed {
      background: linear-gradient(180deg, #CE93D8, #9C27B0) !important;
    }
  </style>
</head>
<body>

  <button id="enableBtn">CLICK TO ENABLE AUDIO</button>

  <!-- DK Rap audio element -->
  <audio id="dkrapAudio" preload="auto">
    <source src="/media/dkrap_audio.m4a" type="audio/mp4">
    <source src="/media/dkrap360.mp4" type="video/mp4">
  </audio>

  <!-- Chaos Log -->
  <div id="chaosLog">
    <div class="log-entries" id="logEntries"></div>
  </div>

  <!-- Gamepad Popup -->
  <div id="gamepadPopup">
    <div class="gamepad-header">
      <span class="ctrl-label"><span id="gpDonorName"></span> CONTROLLING <span class="ctrl-name" id="gpTargetName">---</span></span>
      <div class="gamepad-timer-bar"><div class="gamepad-timer-fill" id="gpTimerFill"></div></div>
    </div>
    <div class="gamepad-body">
      <div>
        <div class="gp-shoulders">
          <div class="gp-btn gp-shoulder" data-btn="L">L</div>
          <div class="gp-btn gp-shoulder" data-btn="R">R</div>
        </div>
        <div class="gp-main">
          <div class="gp-dpad">
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="Up">&#9650;</div>
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="Left">&#9664;</div>
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="Right">&#9654;</div>
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="Down">&#9660;</div>
            <div class="gp-btn blank"></div>
          </div>
          <div class="gp-center">
            <div class="gp-btn gp-center-btn" data-btn="Select">SEL</div>
            <div class="gp-btn gp-center-btn" data-btn="Start">STA</div>
          </div>
          <div class="gp-face">
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="X">X</div>
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="Y">Y</div>
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="A">A</div>
            <div class="gp-btn blank"></div>
            <div class="gp-btn" data-btn="B">B</div>
            <div class="gp-btn blank"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Piano Popup -->
  <div id="pianoPopup">
    <div class="piano-header">
      <span class="piano-label"><span id="pianoDonorName"></span> — PIANO TIME!</span>
      <div class="piano-timer-bar"><div class="piano-timer-fill" id="pianoTimerFill"></div></div>
    </div>
    <div class="piano-body">
      <div class="piano-keys" id="pianoKeys"></div>
    </div>
  </div>

  <script>
    // ── Elements ──────────────────────────────────────
    const enableBtn     = document.getElementById('enableBtn');
    const dkrapAudio    = document.getElementById('dkrapAudio');
    const chaosLog      = document.getElementById('chaosLog');
    const logEntries    = document.getElementById('logEntries');
    const gamepadPopup  = document.getElementById('gamepadPopup');
    const gpTargetName  = document.getElementById('gpTargetName');
    const gpTimerFill   = document.getElementById('gpTimerFill');
    const pianoPopup    = document.getElementById('pianoPopup');
    const pianoTimerFill = document.getElementById('pianoTimerFill');
    const pianoKeysEl   = document.getElementById('pianoKeys');

    const WS_URL = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host;
    const MAX_LOG = 8;

    // ── State ────────────────────────────────────────
    let ws;
    let dkRapActive = false;
    let audioUnlocked = false;
    let pendingPlay = null;

    // Control session state
    let lastControllerName = null;
    let controlActive = false;
    let controlExpiresAt = 0;
    let controlDurationMs = 0;
    let controlTimerRAF = null;

    // Piano session state
    let pianoSessionActive = false;
    let pianoExpiresAt = 0;
    let pianoDurationMs = 0;
    let pianoTimerRAF = null;

    // ── Piano synth (Web Audio) ──────────────────────
    let audioCtx = null;
    const activeOscillators = {};
    const NOTE_FREQS = {
      'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
      'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
      'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
      'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25,
      'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99,
      'G#5': 830.61, 'A5': 880.00
    };
    const PIANO_LAYOUT = [
      { note: 'C4', type: 'white' }, { note: 'C#4', type: 'black' },
      { note: 'D4', type: 'white' }, { note: 'D#4', type: 'black' },
      { note: 'E4', type: 'white' },
      { note: 'F4', type: 'white' }, { note: 'F#4', type: 'black' },
      { note: 'G4', type: 'white' }, { note: 'G#4', type: 'black' },
      { note: 'A4', type: 'white' }, { note: 'A#4', type: 'black' },
      { note: 'B4', type: 'white' },
      { note: 'C5', type: 'white' }, { note: 'C#5', type: 'black' },
      { note: 'D5', type: 'white' }, { note: 'D#5', type: 'black' },
      { note: 'E5', type: 'white' },
      { note: 'F5', type: 'white' }, { note: 'F#5', type: 'black' },
      { note: 'G5', type: 'white' }, { note: 'G#5', type: 'black' },
      { note: 'A5', type: 'white' }
    ];

    // Build piano keys DOM
    PIANO_LAYOUT.forEach(k => {
      const el = document.createElement('div');
      el.className = 'p-key ' + k.type;
      el.setAttribute('data-note', k.note);
      pianoKeysEl.appendChild(el);
    });

    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function synthPlayNote(note) {
      if (activeOscillators[note]) return;
      const freq = NOTE_FREQS[note];
      if (!freq) return;
      const ctx = ensureAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(freq * 4, ctx.currentTime);
      filter.Q.setValueAtTime(1, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      activeOscillators[note] = { osc, gain };

      // Visual
      const keyEl = pianoKeysEl.querySelector(`[data-note="${note}"]`);
      if (keyEl) keyEl.classList.add('pressed');
    }

    function synthStopNote(note) {
      const entry = activeOscillators[note];
      if (!entry) return;
      const ctx = ensureAudioCtx();
      entry.gain.gain.cancelScheduledValues(ctx.currentTime);
      entry.gain.gain.setValueAtTime(entry.gain.gain.value, ctx.currentTime);
      entry.gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
      entry.osc.stop(ctx.currentTime + 0.2);
      delete activeOscillators[note];

      const keyEl = pianoKeysEl.querySelector(`[data-note="${note}"]`);
      if (keyEl) keyEl.classList.remove('pressed');
    }

    // ── Audio Unlock ─────────────────────────────────
    function tryUnlockAudio() {
      // Unlock DK Rap audio element
      dkrapAudio.play().then(() => {
        dkrapAudio.pause();
        dkrapAudio.currentTime = 0;
        audioUnlocked = true;
        enableBtn.textContent = 'AUDIO ENABLED';
        enableBtn.className = 'enabled hidden';
        // Also init Web Audio
        try { ensureAudioCtx(); } catch {}
        if (pendingPlay !== null) {
          playRap(pendingPlay);
          pendingPlay = null;
        }
      }).catch(() => {
        // Try Web Audio unlock at least
        try {
          const ctx = ensureAudioCtx();
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          g.gain.setValueAtTime(0, ctx.currentTime);
          osc.connect(g); g.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.01);
        } catch {}
      });
    }

    enableBtn.addEventListener('click', tryUnlockAudio);

    // ── DK Rap Playback ──────────────────────────────
    function playRap(startTimestamp) {
      dkRapActive = true;
      if (startTimestamp) {
        const offsetMs = Date.now() - startTimestamp;
        dkrapAudio.currentTime = Math.max(0, offsetMs / 1000);
      } else {
        dkrapAudio.currentTime = 0;
      }
      dkrapAudio.play().catch(() => {
        pendingPlay = startTimestamp;
      });
      dkrapAudio.onended = () => stopRap();
    }

    function stopRap() {
      dkRapActive = false;
      pendingPlay = null;
      dkrapAudio.pause();
      dkrapAudio.currentTime = 0;
    }

    // ── Chaos Log ────────────────────────────────────
    let logFadeTimer = null;

    function addLog(text, type) {
      // Show log (fade in)
      chaosLog.classList.remove('fading');
      chaosLog.classList.add('visible');

      const t = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry type-' + type;
      entry.innerHTML = '<span class="log-time">[' + t + ']</span> ' + text;
      logEntries.insertBefore(entry, logEntries.firstChild);
      while (logEntries.children.length > MAX_LOG) {
        logEntries.removeChild(logEntries.lastChild);
      }

      // Reset 15s fade-out timer
      clearTimeout(logFadeTimer);
      logFadeTimer = setTimeout(() => {
        chaosLog.classList.add('fading');
        // After fade-out transition completes, hide
        setTimeout(() => {
          if (chaosLog.classList.contains('fading')) {
            chaosLog.classList.remove('visible');
          }
        }, 500);
      }, 15000);
    }

    // ── Gamepad Timer ────────────────────────────────
    function startControlTimer() {
      cancelAnimationFrame(controlTimerRAF);
      (function tick() {
        const remaining = Math.max(0, controlExpiresAt - Date.now());
        const pct = controlDurationMs > 0 ? (remaining / controlDurationMs) * 100 : 0;
        gpTimerFill.style.width = pct + '%';
        if (remaining <= 0) {
          hideGamepad();
          return;
        }
        controlTimerRAF = requestAnimationFrame(tick);
      })();
    }

    function showGamepad(controllerName, targetStreamer, expiresAt, durationMs) {
      document.getElementById('gpDonorName').textContent = controllerName;
      gpTargetName.textContent = targetStreamer === '__ALL__' ? 'ALL' : targetStreamer;
      controlExpiresAt = expiresAt;
      controlDurationMs = durationMs;
      controlActive = true;
      gamepadPopup.classList.add('visible');
      startControlTimer();
    }

    function hideGamepad() {
      controlActive = false;
      gamepadPopup.classList.remove('visible');
      cancelAnimationFrame(controlTimerRAF);
      // Clear all pressed buttons
      document.querySelectorAll('#gamepadPopup .gp-btn.pressed').forEach(el => el.classList.remove('pressed'));
    }

    function updateGamepadButtons(buttons) {
      document.querySelectorAll('#gamepadPopup [data-btn]').forEach(el => {
        const btn = el.getAttribute('data-btn');
        if (buttons[btn]) {
          el.classList.add('pressed');
        } else {
          el.classList.remove('pressed');
        }
      });
    }

    // ── Piano Timer ──────────────────────────────────
    function startPianoTimer() {
      cancelAnimationFrame(pianoTimerRAF);
      (function tick() {
        const remaining = Math.max(0, pianoExpiresAt - Date.now());
        const pct = pianoDurationMs > 0 ? (remaining / pianoDurationMs) * 100 : 0;
        pianoTimerFill.style.width = pct + '%';
        if (remaining <= 0) {
          hidePiano();
          return;
        }
        pianoTimerRAF = requestAnimationFrame(tick);
      })();
    }

    function showPiano(donorName, expiresAt, durationMs) {
      document.getElementById('pianoDonorName').textContent = donorName || '';
      pianoExpiresAt = expiresAt;
      pianoDurationMs = durationMs;
      pianoSessionActive = true;
      pianoPopup.classList.add('visible');
      startPianoTimer();
    }

    function hidePiano() {
      pianoSessionActive = false;
      pianoPopup.classList.remove('visible');
      cancelAnimationFrame(pianoTimerRAF);
      // Stop all notes & clear visuals
      Object.keys(activeOscillators).forEach(n => synthStopNote(n));
      pianoKeysEl.querySelectorAll('.pressed').forEach(el => el.classList.remove('pressed'));
    }

    // ── WebSocket ────────────────────────────────────
    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'REGISTER_VIEWER' }));
      };

      ws.onmessage = ({ data }) => {
        try {
          const msg = JSON.parse(data);

          switch (msg.type) {
            // DK Rap
            case 'TRIGGERED':
              playRap(msg.startTimestamp);
              addLog('<strong>' + esc(msg.donorName) + '</strong> donated <strong>$' + msg.amount + '</strong> — DK RAP!', 'rap');
              break;

            case 'STATUS':
              if (!msg.dkRapActive && dkRapActive) stopRap();
              break;

            // Control sessions
            case 'CONTROL_ACTIVE':
              if (msg.sessions && msg.sessions.length > 0) {
                const s = msg.sessions[0];
                const expiresAt = Date.now() + s.remainingMs;
                const isNew = !controlActive || lastControllerName !== s.controllerName;
                showGamepad(s.controllerName, s.targetStreamer, expiresAt, s.remainingMs);
                if (isNew) {
                  lastControllerName = s.controllerName;
                  addLog('<strong>' + esc(s.controllerName) + '</strong> took control of <strong>' + esc(s.targetStreamer === '__ALL__' ? 'ALL' : s.targetStreamer) + '</strong>', 'control');
                }
              } else if (controlActive) {
                hideGamepad();
                lastControllerName = null;
              }
              break;

            // Live button presses
            case 'INPUT_BROADCAST':
              if (msg.buttons) updateGamepadButtons(msg.buttons);
              break;

            // Piano session
            case 'PIANO_SESSION_ACTIVE':
              if (msg.active) {
                const durationMs = msg.expiresAt - Date.now();
                showPiano(msg.donorName, msg.expiresAt, durationMs);
                addLog('<strong>' + esc(msg.donorName) + '</strong> — Piano Time!', 'piano');
              } else {
                hidePiano();
              }
              break;

            // Piano notes (audio + visual)
            case 'PIANO_NOTE':
              if (msg.action === 'on') {
                synthPlayNote(msg.note);
              } else {
                synthStopNote(msg.note);
              }
              break;

            // CrowdControl effects
            case 'CC_EFFECT_EVENT':
              addLog('<strong>' + esc(msg.viewerName) + '</strong> used <strong>' + esc(msg.effectName) + '</strong>', 'cc');
              break;
          }
        } catch { /* ignore parse errors */ }
      };

      ws.onclose = () => {
        setTimeout(connect, 3000);
      };
      ws.onerror = () => ws.close();
    }

    function esc(s) {
      if (!s) return '???';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Debug helpers (accessible from console/eval) ─
    window._overlay = { addLog, showGamepad, hideGamepad, updateGamepadButtons, showPiano, hidePiano, synthPlayNote, synthStopNote };

    // ── Start ────────────────────────────────────────
    connect();
    setTimeout(tryUnlockAudio, 500);
  </script>
